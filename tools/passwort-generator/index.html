<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <h1>Password Generator</h1>
    <p>Generates a random password locally in your browser. No data is transmitted.</p>

    <label for="length">Length</label>
    <input id="length" type="number" min="8" max="64" value="20">

    <button id="generate">Generate</button>

    <textarea id="output" rows="4" readonly placeholder="Password will appear here..."></textarea>
  </main>
  <script src="app.js"></script>
</body>
</html>
