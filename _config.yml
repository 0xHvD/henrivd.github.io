title: "henrivd"
name: "Henri van Dorsten"
description: "Blog, Security Notes and small Tools"
url: "https://henrivd.github.io"
baseurl: ""
repository: "henrivd/henrivd.github.io"
locale: "en-US"

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

search: true

paginate: 5
paginate_path: /blog/page:num/

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

author:
  name: "Henri van Dorsten"
  bio: "IT Security Consultant · Active Directory · Entra ID"
  location: "Germany"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/henrivd"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/henri-van-dorsten-180a7b23a/"
    - label: "RSS"
      icon: "fas fa-fw fa-rss-square"
      url: "/feed.xml"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/henrivd"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      classes: wide
