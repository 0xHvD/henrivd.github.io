title: "henrivd"
name: "Henri van Dorsten"
description: "Blog, Security-Notizen und kleine Tools"
url: "https://henrivd.github.io"
baseurl: ""
repository: "henrivd/henrivd.github.io"
locale: "de-DE"

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark"

search: true

paginate: 5
paginate_path: /blog/page:num/

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

author:
  name: "Henri van Dorsten"
  bio: "IT Security Consultant"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/henrivd"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/henrivd"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
